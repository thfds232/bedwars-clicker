name: Build Fixed Fabric Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Fabric Project
        run: |
          # Скачиваем официальный, полностью настроенный рабочий скелет мода Fabric
          git clone --depth=1 https://github.com template
          
          # Очищаем демонстрационные файлы шаблона, чтобы они не мешали
          rm -rf template/src/main/java/com
          mkdir -p template/src/main/java/net/autoclicky
          
          # Копируем наши файлы с кодом в правильные рабочие папки проекта
          cp AutoClickyMod.java template/src/main/java/net/autoclicky/
          cp fabric.mod.json template/src/main/resources/
          
          # Настраиваем конфигурацию сборщика под версию 1.21.1 (она полностью совместима с 1.21.11)
          cd template
          sed -i 's/minecraft_version=.*/minecraft_version=1.21.1/g' gradle.properties
          
          # Даем системе права и запускаем официальную компиляцию через Gradle
          chmod +x gradlew
          ./gradlew build

      - name: Upload Finished Mod File
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicky-Jar
          path: template/build/libs/*-base.jar
