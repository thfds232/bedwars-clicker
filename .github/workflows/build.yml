name: Build Fabric Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Fabric Project
        run: |
          # Скачиваем официальный легковесный шаблон сборщика Fabric
          git clone --depth=1 https://github.com template
          
          # Наводим порядок в структуре
          rm -rf template/src/main/java/com
          mkdir -p template/src/main/java/net/autoclicky
          
          # Переносим наши файлы в официальный сборщик
          cp AutoClickyMod.java template/src/main/java/net/autoclicky/
          cp fabric.mod.json template/src/main/resources/
          
          # Настраиваем версию игры 1.21.1 в сборщике для совместимости
          cd template
          sed -i 's/minecraft_version=.*/minecraft_version=1.21.1/g' gradle.properties
          
          # Запускаем официальную безопасную компиляцию
          chmod +x gradlew
          ./gradlew build

      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicky-Jar-File
          path: template/build/libs/*-base.jar
