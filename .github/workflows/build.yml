name: Build Safe Fabric Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Minecraft Environment
        run: |
          # 1. Скачиваем официальный Fabric Loader для компиляции кода
          wget -q https://fabricmc.net
          
          # 2. Скачиваем официальную базу Minecraft 1.21.1 со всеми хитбоксами и кнопками
          wget -q https://mojang.com -O minecraft-1.21.1.jar

      - name: Compile and Pack Jar
        run: |
          # Создаем точную структуру папок внутри сервера
          mkdir -p net/autoclicky
          mv AutoClickyMod.java net/autoclicky/
          
          # Компилируем код, подключив скачанную базу игры и загрузчик
          javac -cp "fabric-loader-0.15.11.jar:minecraft-1.21.1.jar" net/autoclicky/AutoClickyMod.java
          
          # Упаковываем .class файлы и паспорт json в готовый .jar мод
          jar cf autoclicky-1.21.11.jar fabric.mod.json net/

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicky-Jar-File
          path: autoclicky-1.21.11.jar
